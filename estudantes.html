<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Montserrat', sans-serif; background: transparent; padding: 10px; }

    .section-title {
      font-size: 18px;
      font-weight: 700;
      color: #ffffff;
      background-color: #c0122c;
      padding: 10px 20px;
      margin-bottom: 20px;
      border-radius: 4px;
    }
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    .card {
      background-color: #ffffff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }
    .card h3 {
      font-size: 14px;
      font-weight: 700;
      color: #c0122c;
      margin-bottom: 8px;
    }
    .card p {
      font-size: 12px;
      color: #444444;
      margin-bottom: 12px;
      line-height: 1.5;
    }
    .card a {
      font-size: 12px;
      color: #c0122c;
      text-decoration: none;
      font-weight: 600;
    }
    .card a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="section-title">Para Estudantes</div>
  <div class="cards-grid">

    <div class="card">
      <h3>AI Fluency for Students</h3>
      <p>Desenvolve competências de fluência em IA para aprendizagem, planeamento de carreira e sucesso académico com IA responsável.</p>
      <a href="https://anthropic.skilljar.com/ai-fluency-for-students" target="_blank">Aceder ao curso →</a>
    </div>

  </div>

</body>
</html>
